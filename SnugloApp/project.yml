name: SnugloApp

options:
  bundleIdPrefix: com.felabs
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

packages:
  SnugloEngine:
    path: ".."

targets:
  SnugloApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.xcodeproj"
          - "Resources/Sounds"
    resources:
      - path: Resources/Sounds
        buildPhase: resources
    dependencies:
      - package: SnugloEngine
        product: SnugloEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felabs.snuglo
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        MARKETING_VERSION: "0.2.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_STRICT_CONCURRENCY: minimal
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        # Faz G-2: Required for ATTrackingManager / IDFA (App Tracking Transparency)
        INFOPLIST_KEY_NSUserTrackingUsageDescription: "To deliver personalized ads. You can opt out anytime in Settings."
        # H-1: Localization support — EN (dev), TR, ES
        INFOPLIST_KEY_CFBundleDevelopmentRegion: en
        INFOPLIST_KEY_CFBundleLocalizations: "en tr es"

  SnugloAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ../Tests/SnugloAppTests
    dependencies:
      - target: SnugloApp
      - package: SnugloEngine
        product: SnugloEngine
    settings:
      base:
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: minimal
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES
