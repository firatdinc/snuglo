name: SnugloApp

options:
  bundleIdPrefix: com.felabs
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

packages:
  SnugloEngine:
    path: ".."

targets:
  SnugloApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "*.xcodeproj"
          - "Resources/Sounds"
          - "SnugloAppUITests"   # Faz I-2: exclude UITest bundle from app sources
    resources:
      - path: Resources/Sounds
        buildPhase: resources
      - path: Resources/Assets.xcassets
        buildPhase: resources
    dependencies:
      - package: SnugloEngine
        product: SnugloEngine
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felabs.snuglo
        SWIFT_VERSION: "5.9"
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_UISupportedInterfaceOrientations: UIInterfaceOrientationPortrait
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "2"
        # H-2: Launch screen background color (from Assets.xcassets/LaunchBackground.colorset)
        # UILaunchScreen dict is generated; UIColorName sub-key references the colorset.
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: minimal
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        # Faz G-2: Required for ATTrackingManager / IDFA (App Tracking Transparency)
        INFOPLIST_KEY_NSUserTrackingUsageDescription: "To deliver personalized ads. You can opt out anytime in Settings."
        # H-1: Localization support — EN (dev), TR, ES
        INFOPLIST_KEY_CFBundleDevelopmentRegion: en
        INFOPLIST_KEY_CFBundleLocalizations: "en tr es"

  SnugloAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ../Tests/SnugloAppTests
    dependencies:
      - target: SnugloApp
      - package: SnugloEngine
        product: SnugloEngine
    settings:
      base:
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: minimal
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES

  # Faz I-2: XCUITest smoke suite
  SnugloAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: SnugloAppUITests
    dependencies:
      - target: SnugloApp
    settings:
      base:
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: minimal
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SnugloApp

# Faz I-2: Explicit scheme — fixes "Supported platforms … is empty" IDERunDestination error.
# Also adds SnugloAppUITests to the test action so -only-testing:SnugloAppUITests works.
schemes:
  SnugloApp:
    build:
      targets:
        SnugloApp: all
        SnugloAppTests: [test]
        SnugloAppUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: SnugloAppTests
          parallelizable: true
          randomExecutionOrder: false
        - name: SnugloAppUITests
          parallelizable: false
          randomExecutionOrder: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
