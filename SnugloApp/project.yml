name: SnugloApp

options:
  bundleIdPrefix: com.felabs
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true
  developmentLanguage: en

packages:
  SnugloEngine:
    path: ".."
  GoogleMobileAds:
    url: https://github.com/googleads/swift-package-manager-google-mobile-ads.git
    from: "11.13.0"

targets:
  SnugloApp:
    type: application
    platform: iOS
    deploymentTarget: "18.0"
    # v1.1 BLOCKER-07 fix: the font/sound dirs used to be EXCLUDED from this
    # scan and re-added via `resources:` directory entries — but xcodegen
    # silently dropped resource files living under a source-excluded dir, so NO
    # .ttf/.caf ever reached the bundle (FontParser "No such file", SoundService
    # "Missing asset"). Letting the `.` scan include Resources/ lets xcodegen
    # auto-classify .xcassets/.ttf/.caf into the Copy Resources phase (flat in
    # the .app root, where UIAppFonts + Bundle.main.url expect them).
    sources:
      - path: .
        excludes:
          - "project.yml"
          - "Info.plist"         # Processed via INFOPLIST_FILE build setting — must not be in Copy Bundle Resources
          - "*.xcodeproj"
          - "SnugloAppUITests"   # Faz I-2: exclude UITest bundle from app sources
    dependencies:
      - package: SnugloEngine
        product: SnugloEngine
      - package: GoogleMobileAds
        product: GoogleMobileAds
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.felabs.snuglo
        SWIFT_VERSION: "5.9"
        # v1.1: Switched to custom Info.plist — fixes BLOCKER-01 (UILaunchScreen) + BLOCKER-07 (UIAppFonts).
        # GENERATE_INFOPLIST_FILE removed; all keys now in SnugloApp/Info.plist.
        INFOPLIST_FILE: $(SRCROOT)/Info.plist
        MARKETING_VERSION: "1.1.0"
        CURRENT_PROJECT_VERSION: "3"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SWIFT_STRICT_CONCURRENCY: minimal
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        CODE_SIGN_ENTITLEMENTS: $(SRCROOT)/SnugloApp.entitlements

  SnugloAppTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: ../Tests/SnugloAppTests
    dependencies:
      - target: SnugloApp
      - package: SnugloEngine
        product: SnugloEngine
    settings:
      base:
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: minimal
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES

  # Faz I-2: XCUITest smoke suite
  SnugloAppUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "18.0"
    sources:
      - path: SnugloAppUITests
    dependencies:
      - target: SnugloApp
    settings:
      base:
        SWIFT_VERSION: "5.9"
        SWIFT_STRICT_CONCURRENCY: minimal
        IPHONEOS_DEPLOYMENT_TARGET: "18.0"
        GENERATE_INFOPLIST_FILE: YES
        TEST_TARGET_NAME: SnugloApp

# Faz I-2: Explicit scheme — fixes "Supported platforms … is empty" IDERunDestination error.
# Also adds SnugloAppUITests to the test action so -only-testing:SnugloAppUITests works.
schemes:
  SnugloApp:
    build:
      targets:
        SnugloApp: all
        SnugloAppTests: [test]
        SnugloAppUITests: [test]
    run:
      config: Debug
    test:
      config: Debug
      gatherCoverageData: true
      targets:
        - name: SnugloAppTests
          parallelizable: true
          randomExecutionOrder: false
        - name: SnugloAppUITests
          parallelizable: false
          randomExecutionOrder: false
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release
