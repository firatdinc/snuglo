<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Snuglo - Level Complete</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500&amp;family=Plus+Jakarta+Sans:wght@600&amp;family=Space+Grotesk:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#65587a",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#211a17",
                        "tertiary": "#665f31",
                        "surface": "#fdf8fb",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#ece7ea",
                        "outline-variant": "#cbc4ce",
                        "on-secondary-container": "#6b605c",
                        "primary-fixed": "#ecdcff",
                        "on-background": "#1c1b1d",
                        "on-primary-fixed": "#211634",
                        "on-tertiary-fixed": "#201c00",
                        "secondary-fixed": "#eedfda",
                        "error-container": "#ffdad6",
                        "on-surface": "#1c1b1d",
                        "surface-tint": "#65587a",
                        "inverse-surface": "#323032",
                        "secondary": "#675c58",
                        "primary-container": "#c5b5dc",
                        "outline": "#7a757e",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#ded9dc",
                        "error": "#ba1a1a",
                        "surface-variant": "#e6e1e4",
                        "on-primary-fixed-variant": "#4d4162",
                        "secondary-fixed-dim": "#d2c4be",
                        "inverse-primary": "#d0c0e7",
                        "on-secondary-fixed-variant": "#4e4541",
                        "on-primary-container": "#524566",
                        "inverse-on-surface": "#f5eff2",
                        "on-surface-variant": "#49454d",
                        "secondary-container": "#ebddd7",
                        "tertiary-fixed": "#eee4aa",
                        "primary-fixed-dim": "#d0c0e7",
                        "surface-container-highest": "#e6e1e4",
                        "on-error": "#ffffff",
                        "surface-bright": "#fdf8fb",
                        "on-tertiary-container": "#524c20",
                        "tertiary-container": "#c6bd86",
                        "tertiary-fixed-dim": "#d1c890",
                        "on-tertiary-fixed-variant": "#4d471c",
                        "surface-container-low": "#f8f2f5",
                        "on-tertiary": "#ffffff",
                        "background": "#fdf8fb",
                        "surface-container": "#f2ecf0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "padding-internal": "16px",
                        "stack-lg": "32px",
                        "gutter-grid": "4px",
                        "margin-screen": "24px",
                        "stack-md": "16px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "number-display": ["Space Grotesk"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "label-sm": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "number-display": ["20px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "body-md": ["15px", { "lineHeight": "21px", "fontWeight": "400" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
        body {
            background-color: #FAF6F0; /* Soft Minimalist background */
        }
        
        .confetti-dot {
            position: absolute;
            border-radius: 50%;
            opacity: 0.6;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) scale(1); opacity: 0.6; }
            50% { transform: translateY(-20px) scale(1.1); opacity: 0.8; }
        }

        .ambient-glow {
            box-shadow: 0px 4px 12px rgba(58, 51, 45, 0.06);
        }

        .bevel-top {
            box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.5);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-body-lg text-on-surface h-screen w-screen overflow-hidden flex flex-col justify-end">
<!-- Dimmed Background Overlay -->
<div class="absolute inset-0 bg-inverse-surface/40 backdrop-blur-sm z-10 transition-opacity"></div>
<!-- Bottom Sheet -->
<div class="relative z-20 w-full h-[663px] bg-surface rounded-t-3xl ambient-glow flex flex-col items-center px-margin-screen pb-margin-screen pt-stack-md transition-transform duration-300 transform translate-y-0 overflow-hidden">
<!-- Drag Handle -->
<div class="w-12 h-1.5 bg-outline-variant/50 rounded-full mb-stack-lg"></div>
<!-- Confetti Background Layer -->
<div class="absolute inset-0 overflow-hidden pointer-events-none z-0" id="confetti-container">
<!-- Confetti injected via JS -->
</div>
<div class="relative z-10 flex flex-col items-center w-full max-w-md mx-auto">
<!-- Focal Point: Large Check Circle with Blush Accent -->
<div class="relative flex items-center justify-center w-24 h-24 mb-stack-lg">
<div class="absolute inset-0 bg-[#F5E6E0] rounded-full scale-125 opacity-80 blur-xl"></div>
<div class="absolute inset-0 bg-[#F5E6E0] rounded-full scale-110"></div>
<div class="relative w-16 h-16 bg-primary-container rounded-full flex items-center justify-center bevel-top">
<span class="material-symbols-outlined text-on-primary-container font-headline-lg" style="font-size: 36px; font-variation-settings: 'FILL' 1;">check</span>
</div>
</div>
<!-- Headline -->
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-md text-center">Level complete!</h1>
<!-- Thumbnail Grid (Visual representation of solved puzzle) -->
<div class="w-24 h-24 bg-[#F2EBE0] rounded-lg p-1 flex flex-wrap gap-1 mb-stack-lg ambient-glow">
<div class="w-[calc(50%-2px)] h-[calc(50%-2px)] bg-primary/20 rounded-sm"></div>
<div class="w-[calc(50%-2px)] h-[calc(50%-2px)] bg-tertiary-container/40 rounded-sm"></div>
<div class="w-[calc(50%-2px)] h-[calc(50%-2px)] bg-secondary-container/60 rounded-sm"></div>
<div class="w-[calc(50%-2px)] h-[calc(50%-2px)] bg-primary-container rounded-sm"></div>
</div>
<!-- Stats Row -->
<div class="w-full flex justify-between items-center bg-surface-container-low rounded-xl p-padding-internal mb-stack-lg ambient-glow">
<div class="flex flex-col items-center flex-1 border-r border-outline-variant/30">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Time</span>
<span class="font-number-display text-number-display text-primary">02:45</span>
</div>
<div class="flex flex-col items-center flex-1 border-r border-outline-variant/30">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Stars</span>
<div class="flex items-center gap-1">
<span class="material-symbols-outlined text-tertiary" style="font-size: 20px; font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-tertiary" style="font-size: 20px; font-variation-settings: 'FILL' 1;">star</span>
<span class="material-symbols-outlined text-tertiary" style="font-size: 20px; font-variation-settings: 'FILL' 1;">star</span>
</div>
</div>
<div class="flex flex-col items-center flex-1">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase mb-1">Hints</span>
<span class="font-number-display text-number-display text-secondary">0</span>
</div>
</div>
<!-- Action Buttons -->
<div class="w-full flex flex-col gap-stack-md mt-auto pb-stack-lg">
<button class="w-full bg-primary text-on-primary font-headline-sm text-headline-sm py-4 rounded-[14px] bevel-top transition-transform active:scale-95 active:bg-primary/90 flex items-center justify-center gap-2 ambient-glow">
                    Next level
                    <span class="material-symbols-outlined" style="font-size: 20px;">arrow_forward</span>
</button>
<div class="flex gap-stack-md">
<button class="flex-1 bg-surface-container-lowest text-secondary font-headline-sm text-headline-sm py-3.5 rounded-[14px] border-[1.5px] border-[#EDE6DA] transition-transform active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-size: 20px;">refresh</span>
                        Replay
                    </button>
<button class="flex-1 bg-transparent text-secondary font-headline-sm text-headline-sm py-3.5 rounded-[14px] transition-colors hover:bg-surface-variant/50 active:scale-95 flex items-center justify-center gap-2">
<span class="material-symbols-outlined" style="font-size: 20px;">home</span>
                        Home
                    </button>
</div>
</div>
</div>
</div>
<script>
        // Simple confetti generation
        const colors = ['bg-primary-container', 'bg-tertiary-container', 'bg-secondary-container', 'bg-error-container'];
        const container = document.getElementById('confetti-container');
        
        for (let i = 0; i < 30; i++) {
            const dot = document.createElement('div');
            const size = Math.random() * 8 + 4; // 4px to 12px
            const colorClass = colors[Math.floor(Math.random() * colors.length)];
            
            dot.className = `confetti-dot ${colorClass}`;
            dot.style.width = `${size}px`;
            dot.style.height = `${size}px`;
            dot.style.left = `${Math.random() * 100}%`;
            dot.style.top = `${Math.random() * 100}%`;
            dot.style.animationDelay = `${Math.random() * 2}s`;
            
            container.appendChild(dot);
        }
    </script>
</body></html>
