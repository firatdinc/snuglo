<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Snuglo - Levels</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500;600&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;family=Space+Grotesk:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-family: 'Material Symbols Outlined';
            font-weight: normal;
            font-style: normal;
            font-size: 24px;
            line-height: 1;
            letter-spacing: normal;
            text-transform: none;
            display: inline-block;
            white-space: nowrap;
            word-wrap: normal;
            direction: ltr;
            -webkit-font-feature-settings: 'liga';
            -webkit-font-smoothing: antialiased;
        }
    </style>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#65587a",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#211a17",
                        "tertiary": "#665f31",
                        "surface": "#fdf8fb",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#ece7ea",
                        "outline-variant": "#cbc4ce",
                        "on-secondary-container": "#6b605c",
                        "primary-fixed": "#ecdcff",
                        "on-background": "#1c1b1d",
                        "on-primary-fixed": "#211634",
                        "on-tertiary-fixed": "#201c00",
                        "secondary-fixed": "#eedfda",
                        "error-container": "#ffdad6",
                        "on-surface": "#1c1b1d",
                        "surface-tint": "#65587a",
                        "inverse-surface": "#323032",
                        "secondary": "#675c58",
                        "primary-container": "#c5b5dc",
                        "outline": "#7a757e",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#ded9dc",
                        "error": "#ba1a1a",
                        "surface-variant": "#e6e1e4",
                        "on-primary-fixed-variant": "#4d4162",
                        "secondary-fixed-dim": "#d2c4be",
                        "inverse-primary": "#d0c0e7",
                        "on-secondary-fixed-variant": "#4e4541",
                        "on-primary-container": "#524566",
                        "inverse-on-surface": "#f5eff2",
                        "on-surface-variant": "#49454d",
                        "secondary-container": "#ebddd7",
                        "tertiary-fixed": "#eee4aa",
                        "primary-fixed-dim": "#d0c0e7",
                        "surface-container-highest": "#e6e1e4",
                        "on-error": "#ffffff",
                        "surface-bright": "#fdf8fb",
                        "on-tertiary-container": "#524c20",
                        "tertiary-container": "#c6bd86",
                        "tertiary-fixed-dim": "#d1c890",
                        "on-tertiary-fixed-variant": "#4d471c",
                        "surface-container-low": "#f8f2f5",
                        "on-tertiary": "#ffffff",
                        "background": "#fdf8fb",
                        "surface-container": "#f2ecf0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "padding-internal": "16px",
                        "stack-lg": "32px",
                        "gutter-grid": "4px",
                        "margin-screen": "24px",
                        "stack-md": "16px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "number-display": ["Space Grotesk"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "label-sm": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", { "lineHeight": "24px", "fontWeight": "400" }],
                        "headline-lg": ["28px", { "lineHeight": "34px", "letterSpacing": "-0.02em", "fontWeight": "600" }],
                        "number-display": ["20px", { "lineHeight": "24px", "fontWeight": "500" }],
                        "body-md": ["15px", { "lineHeight": "21px", "fontWeight": "400" }],
                        "headline-md": ["22px", { "lineHeight": "28px", "fontWeight": "600" }],
                        "headline-sm": ["18px", { "lineHeight": "24px", "fontWeight": "600" }],
                        "label-sm": ["12px", { "lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500" }]
                    }
                }
            }
        }
    </script>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen text-on-background selection:bg-primary-container antialiased flex flex-col">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-surface/80 backdrop-blur-md">
<button class="text-on-surface-variant hover:opacity-80 transition-opacity p-2 -ml-2 rounded-full focus:outline-none focus:ring-2 focus:ring-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">settings</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold text-primary tracking-tight">Snuglo</h1>
<button class="text-on-surface-variant hover:opacity-80 transition-opacity p-2 -mr-2 rounded-full focus:outline-none focus:ring-2 focus:ring-primary-container">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">shopping_bag</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="flex-1 pt-24 pb-32 px-margin-screen flex flex-col">
<!-- Header Section -->
<div class="mb-stack-lg">
<h2 class="font-headline-lg text-headline-lg text-on-background mb-1">Levels</h2>
<p class="font-body-md text-body-md text-on-surface-variant">Pick a pack</p>
</div>
<!-- Levels List Container -->
<div class="flex flex-col gap-stack-md">
<!-- Pack Card: Cozy Beginnings -->
<button class="w-full text-left bg-surface-container-lowest rounded-xl p-padding-internal shadow-[0px_4px_12px_rgba(58,51,45,0.06)] relative overflow-hidden group hover:scale-[0.98] transition-transform duration-200 focus:outline-none focus:ring-2 focus:ring-primary-container ring-offset-2 ring-offset-background">
<!-- Inner light stroke for tactile feel -->
<div class="absolute inset-0 rounded-xl border border-white/50 pointer-events-none"></div>
<div class="flex justify-between items-start mb-stack-md">
<div>
<h3 class="font-headline-sm text-headline-sm text-on-background mb-1">Cozy Beginnings</h3>
<span class="inline-flex items-center px-2 py-1 bg-surface-container rounded-md font-label-sm text-label-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[14px] mr-1">grid_on</span>
                            5x5
                        </span>
</div>
<div class="w-12 h-12 rounded-lg bg-primary-container flex items-center justify-center text-on-primary-container shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">eco</span>
</div>
</div>
<div>
<div class="flex justify-between items-end mb-2">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Progress</span>
<div class="font-number-display text-number-display text-primary flex items-baseline">
                            18<span class="text-on-surface-variant/50 text-sm ml-1">/30</span>
</div>
</div>
<div class="h-3 bg-surface-container rounded-full overflow-hidden w-full relative">
<!-- Thicker pill track as requested -->
<div class="h-full bg-primary rounded-full absolute left-0 top-0 transition-all duration-500 ease-out" style="width: 60%;"></div>
</div>
</div>
</button>
<!-- Pack Card: Spice Route -->
<button class="w-full text-left bg-surface-container-lowest rounded-xl p-padding-internal shadow-[0px_4px_12px_rgba(58,51,45,0.06)] relative overflow-hidden group hover:scale-[0.98] transition-transform duration-200 focus:outline-none focus:ring-2 focus:ring-primary-container ring-offset-2 ring-offset-background">
<div class="absolute inset-0 rounded-xl border border-white/50 pointer-events-none"></div>
<div class="flex justify-between items-start mb-stack-md">
<div>
<h3 class="font-headline-sm text-headline-sm text-on-background mb-1">Spice Route</h3>
<span class="inline-flex items-center px-2 py-1 bg-surface-container rounded-md font-label-sm text-label-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[14px] mr-1">grid_on</span>
                            6x6
                        </span>
</div>
<div class="w-12 h-12 rounded-lg bg-secondary-container flex items-center justify-center text-on-secondary-container shadow-sm">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">local_cafe</span>
</div>
</div>
<div>
<div class="flex justify-between items-end mb-2">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Progress</span>
<div class="font-number-display text-number-display text-primary flex items-baseline">
                            4<span class="text-on-surface-variant/50 text-sm ml-1">/30</span>
</div>
</div>
<div class="h-3 bg-surface-container rounded-full overflow-hidden w-full relative">
<div class="h-full bg-primary rounded-full absolute left-0 top-0 transition-all duration-500 ease-out" style="width: 13.3%;"></div>
</div>
</div>
</button>
<!-- Pack Card: Mambo Nights (Locked) -->
<div class="w-full bg-surface-container-lowest rounded-xl p-padding-internal shadow-[0px_4px_12px_rgba(58,51,45,0.06)] relative overflow-hidden opacity-40 select-none flex flex-col gap-stack-md">
<div class="flex justify-between items-start">
<div>
<h3 class="font-headline-sm text-headline-sm text-on-background mb-1">Mambo Nights</h3>
<span class="inline-flex items-center px-2 py-1 bg-surface-container rounded-md font-label-sm text-label-sm text-on-surface-variant">
<span class="material-symbols-outlined text-[14px] mr-1">grid_on</span>
                            7x7
                        </span>
</div>
<div class="w-12 h-12 rounded-lg bg-surface-variant flex items-center justify-center text-on-surface-variant">
<span class="material-symbols-outlined">lock</span>
</div>
</div>
<div>
<div class="flex justify-between items-end mb-2">
<span class="font-label-sm text-label-sm text-on-surface-variant uppercase tracking-wider">Locked</span>
<div class="font-number-display text-number-display text-on-surface-variant flex items-baseline">
                            0<span class="text-on-surface-variant/50 text-sm ml-1">/30</span>
</div>
</div>
<div class="h-3 bg-surface-container rounded-full overflow-hidden w-full"></div>
</div>
</div>
</div>
</main>
<!-- BottomNavBar -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pt-2 pb-8 bg-surface rounded-t-xl shadow-[0px_-4px_12px_rgba(58,51,45,0.06)] md:hidden">
<button class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 hover:bg-secondary-container/50 rounded-xl transition-colors group">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform">extension</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Play</span>
</button>
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-4 py-1.5 scale-98 transition-all duration-200 shadow-sm pointer-events-none">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">grid_view</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider font-bold">Levels</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 hover:bg-secondary-container/50 rounded-xl transition-colors group">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform">leaderboard</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Stats</span>
</button>
<button class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 hover:bg-secondary-container/50 rounded-xl transition-colors group">
<span class="material-symbols-outlined mb-1 group-hover:scale-110 transition-transform">storefront</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Shop</span>
</button>
</nav>
</body></html>
