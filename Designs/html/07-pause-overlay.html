<!DOCTYPE html>

<html class="h-full" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Paused - Snuglo</title>

                    },
                    "spacing": {

<style>
        body {
            background-color: #FAF6F0; /* Level 0 Background */
            -webkit-tap-highlight-color: transparent;
        }
        .btn-primary {
            box-shadow: inset 0 0.5px 0 0 rgba(255, 255, 255, 0.5);
        }
        .btn-primary:active {
            transform: scale(0.98);
            filter: brightness(0.95);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="h-full flex items-center justify-center font-body-md text-on-surface antialiased overflow-hidden">
<!-- Mock Background Game Elements (Blurred/Dimmed) -->
<div class="absolute inset-0 z-0 opacity-40 blur-sm flex flex-col p-margin-screen">
<div class="flex justify-between items-center mb-stack-lg">
<div class="font-number-display text-number-display text-on-surface">Score: 4,250</div>
<div class="font-number-display text-number-display text-on-surface">00:01:13</div>
</div>
<!-- Game Board Mock -->
<div class="flex-grow flex items-center justify-center">
<div class="w-full aspect-square bg-board-bg rounded-xl grid grid-cols-8 grid-rows-8 gap-px p-1" style="background-image: linear-gradient(to right, #E5DCC8 1px, transparent 1px), linear-gradient(to bottom, #E5DCC8 1px, transparent 1px); background-size: 12.5% 12.5%;">
<!-- Mock Blocks -->
<div class="col-span-2 row-span-1 bg-[#D4E2D4] rounded-sm m-px"></div>
<div class="col-start-4 col-span-1 row-span-3 bg-[#E8D5D5] rounded-sm m-px"></div>
<div class="col-start-6 col-span-3 row-span-1 bg-[#D5E1E8] rounded-sm m-px"></div>
<div class="col-start-2 row-start-4 col-span-2 row-span-2 bg-[#E8E4D5] rounded-sm m-px"></div>
</div>
</div>
</div>
<!-- Pause Overlay Dimmer -->
<div class="absolute inset-0 bg-[#3A332D]/30 z-10 backdrop-blur-[2px]"></div>
<!-- Pause Card -->
<div class="relative z-20 bg-surface-container-lowest rounded-20dp p-stack-lg w-full max-w-[320px] mx-margin-screen shadow-ambient flex flex-col items-center">
<!-- Header -->
<h1 class="font-headline-lg text-headline-lg text-on-surface mb-stack-sm text-center">Paused</h1>
<div class="font-number-display text-number-display text-secondary mb-stack-lg flex items-center gap-2">
<span class="material-symbols-outlined text-[20px]" style="font-variation-settings: 'FILL' 0;">timer</span>
            00:01:13
        </div>
<!-- Actions -->
<div class="w-full flex flex-col gap-stack-md">
<!-- Resume Button -->
<button class="btn-primary w-full bg-primary text-on-primary font-headline-sm text-headline-sm rounded-btn py-4 transition-all duration-150 flex items-center justify-center gap-2 shadow-ambient">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">play_arrow</span>
                Resume
            </button>
<!-- Restart Button -->
<button class="w-full bg-surface-container-lowest border-[1.5px] border-btn-border text-btn-text font-headline-sm text-headline-sm rounded-btn py-4 transition-all duration-150 flex items-center justify-center gap-2 hover:bg-surface-container-low active:scale-[0.98]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">refresh</span>
                Restart
            </button>
<!-- Home Button -->
<button class="w-full bg-surface-container-lowest border-[1.5px] border-btn-border text-btn-text font-headline-sm text-headline-sm rounded-btn py-4 transition-all duration-150 flex items-center justify-center gap-2 hover:bg-surface-container-low active:scale-[0.98]">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 0;">home</span>
                Home
            </button>
</div>
</div>
</body></html>
