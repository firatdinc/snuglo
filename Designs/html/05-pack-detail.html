<style>
        body {
            background-color: #FAF6F0; /* Level 0 Canvas */
            -webkit-tap-highlight-color: transparent;
        }
        
        .level-tile {
            width: 96px;
            height: 96px;
            background-color: #FFFFFF;
            box-shadow: 0px 4px 12px rgba(58, 51, 45, 0.06);
            border-radius: 14px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
            transition: all 0.2s ease;
        }

        .level-tile::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.8), transparent);
            border-radius: 14px 14px 0 0;
            pointer-events: none;
        }
        
        .level-tile.active {
            box-shadow: 0 0 0 2px #c5b5dc, 0px 8px 16px rgba(58, 51, 45, 0.12);
            transform: scale(1.02);
            background-color: #fdf8fb;
        }

        .level-tile.locked {
            background-color: #f2ecf0;
            opacity: 0.7;
            box-shadow: inset 0px 2px 4px rgba(0,0,0,0.02);
        }

        .star-container {
            display: flex;
            gap: 2px;
            margin-top: 4px;
        }

        .star-icon {
            font-size: 14px;
            color: #c6bd86;
        }
        
        .material-symbols-outlined.fill {
            font-variation-settings: 'FILL' 1;
        }

        /* Banner styling */
        .pack-banner {
            height: 240px;
            background-color: #ebddd7;
            border-radius: 0 0 24px 24px;
            position: relative;
            overflow: hidden;
            display: flex;
            align-items: flex-end;
            padding: 24px;
        }

        .pack-banner-image {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.8;
            mix-blend-mode: multiply;
        }
        
        /* Floating Action Button (Suppressed on sub-pages as per rules) */
        
    </style>
