<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Snuglo - Your Stats</title>
<!-- Material Symbols -->
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Google Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500&amp;family=Plus+Jakarta+Sans:wght@600&amp;family=Space+Grotesk:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind Config -->
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            "colors": {
                    "primary": "#65587a",
                    "on-secondary": "#ffffff",
                    "on-secondary-fixed": "#211a17",
                    "tertiary": "#665f31",
                    "surface": "#fdf8fb",
                    "on-primary": "#ffffff",
                    "on-error-container": "#93000a",
                    "surface-container-high": "#ece7ea",
                    "outline-variant": "#cbc4ce",
                    "on-secondary-container": "#6b605c",
                    "primary-fixed": "#ecdcff",
                    "on-background": "#1c1b1d",
                    "on-primary-fixed": "#211634",
                    "on-tertiary-fixed": "#201c00",
                    "secondary-fixed": "#eedfda",
                    "error-container": "#ffdad6",
                    "on-surface": "#1c1b1d",
                    "surface-tint": "#65587a",
                    "inverse-surface": "#323032",
                    "secondary": "#675c58",
                    "primary-container": "#c5b5dc",
                    "outline": "#7a757e",
                    "surface-container-lowest": "#ffffff",
                    "surface-dim": "#ded9dc",
                    "error": "#ba1a1a",
                    "surface-variant": "#e6e1e4",
                    "on-primary-fixed-variant": "#4d4162",
                    "secondary-fixed-dim": "#d2c4be",
                    "inverse-primary": "#d0c0e7",
                    "on-secondary-fixed-variant": "#4e4541",
                    "on-primary-container": "#524566",
                    "inverse-on-surface": "#f5eff2",
                    "on-surface-variant": "#49454d",
                    "secondary-container": "#ebddd7",
                    "tertiary-fixed": "#eee4aa",
                    "primary-fixed-dim": "#d0c0e7",
                    "surface-container-highest": "#e6e1e4",
                    "on-error": "#ffffff",
                    "surface-bright": "#fdf8fb",
                    "on-tertiary-container": "#524c20",
                    "tertiary-container": "#c6bd86",
                    "tertiary-fixed-dim": "#d1c890",
                    "on-tertiary-fixed-variant": "#4d471c",
                    "surface-container-low": "#f8f2f5",
                    "on-tertiary": "#ffffff",
                    "background": "#fdf8fb",
                    "surface-container": "#f2ecf0"
            },
            "borderRadius": {
                    "DEFAULT": "0.25rem",
                    "lg": "0.5rem",
                    "xl": "0.75rem",
                    "full": "9999px"
            },
            "spacing": {
                    "padding-internal": "16px",
                    "stack-lg": "32px",
                    "gutter-grid": "4px",
                    "margin-screen": "24px",
                    "stack-md": "16px",
                    "stack-sm": "8px"
            },
            "fontFamily": {
                    "body-lg": ["Be Vietnam Pro"],
                    "headline-lg": ["Plus Jakarta Sans"],
                    "number-display": ["Space Grotesk"],
                    "body-md": ["Be Vietnam Pro"],
                    "headline-md": ["Plus Jakarta Sans"],
                    "headline-sm": ["Plus Jakarta Sans"],
                    "label-sm": ["Be Vietnam Pro"]
            },
            "fontSize": {
                    "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                    "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                    "number-display": ["20px", {"lineHeight": "24px", "fontWeight": "500"}],
                    "body-md": ["15px", {"lineHeight": "21px", "fontWeight": "400"}],
                    "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                    "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                    "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
            }
          }
        }
      }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .icon-fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Soft, tactile shadow for cards (Level 1) */
        .hygge-shadow {
            box-shadow: 0px 4px 12px rgba(58, 51, 45, 0.06);
        }
        
        /* Inner light stroke for tactile "beveled" feel */
        .tactile-bevel {
            border-top: 0.5px solid rgba(255, 255, 255, 0.5);
        }

        /* Hide scrollbar for a cleaner look */
        ::-webkit-scrollbar {
            display: none;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-surface text-on-surface font-body-md antialiased pb-32">
<!-- TopAppBar -->
<header class="fixed top-0 w-full z-50 bg-surface/80 backdrop-blur-md flex justify-between items-center px-6 h-16">
<button aria-label="Settings" class="text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="settings">settings</span>
</button>
<div class="font-headline-md text-headline-md font-bold text-primary tracking-tight">
            Snuglo
        </div>
<button aria-label="Shopping Bag" class="text-on-surface-variant hover:opacity-80 transition-opacity">
<span class="material-symbols-outlined" data-icon="shopping_bag">shopping_bag</span>
</button>
</header>
<!-- Main Canvas -->
<main class="pt-[88px] px-margin-screen flex flex-col gap-stack-lg max-w-md mx-auto">
<!-- Header -->
<header>
<h1 class="font-headline-lg text-headline-lg text-primary">Your Stats</h1>
</header>
<!-- 2x2 Stats Grid -->
<section class="grid grid-cols-2 gap-stack-md">
<!-- Solved -->
<div class="bg-surface-container-lowest rounded-xl p-padding-internal hygge-shadow tactile-bevel flex flex-col justify-between aspect-square">
<div class="flex items-center justify-between">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Solved</span>
<span class="material-symbols-outlined text-primary-container text-[20px]" data-icon="extension">extension</span>
</div>
<div class="font-number-display text-number-display text-primary text-3xl">142</div>
</div>
<!-- Time -->
<div class="bg-surface-container-lowest rounded-xl p-padding-internal hygge-shadow tactile-bevel flex flex-col justify-between aspect-square">
<div class="flex items-center justify-between">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Time</span>
<span class="material-symbols-outlined text-secondary-container text-[20px]" data-icon="timer">timer</span>
</div>
<div class="flex flex-col">
<span class="font-number-display text-number-display text-primary text-3xl">48<span class="text-lg text-secondary">h</span></span>
</div>
</div>
<!-- Fastest -->
<div class="bg-surface-container-lowest rounded-xl p-padding-internal hygge-shadow tactile-bevel flex flex-col justify-between aspect-square">
<div class="flex items-center justify-between">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Fastest</span>
<span class="material-symbols-outlined text-tertiary-container text-[20px]" data-icon="bolt">bolt</span>
</div>
<div class="flex flex-col">
<span class="font-number-display text-number-display text-primary text-3xl">1:12</span>
</div>
</div>
<!-- Streak -->
<div class="bg-surface-container-lowest rounded-xl p-padding-internal hygge-shadow tactile-bevel flex flex-col justify-between aspect-square">
<div class="flex items-center justify-between">
<span class="font-label-sm text-label-sm text-secondary uppercase tracking-wider">Streak</span>
<span class="material-symbols-outlined text-error-container text-[20px]" data-icon="local_fire_department">local_fire_department</span>
</div>
<div class="flex flex-col">
<span class="font-number-display text-number-display text-primary text-3xl">14<span class="text-lg text-secondary">d</span></span>
</div>
</div>
</section>
<!-- Bar Chart: Solves per day -->
<section class="bg-surface-container-lowest rounded-xl p-padding-internal hygge-shadow tactile-bevel flex flex-col gap-stack-md">
<h2 class="font-headline-sm text-headline-sm text-primary">Solves per day</h2>
<div class="h-48 flex items-end justify-between pt-4 pb-2 border-b-2 border-surface-container gap-2">
<!-- Bar 1 -->
<div class="flex flex-col items-center justify-end w-full h-[40%] group">
<div class="w-full bg-surface-variant rounded-t-full h-full relative group-hover:bg-primary-container transition-colors duration-300"></div>
<span class="font-label-sm text-label-sm text-secondary mt-2">M</span>
</div>
<!-- Bar 2 -->
<div class="flex flex-col items-center justify-end w-full h-[60%] group">
<div class="w-full bg-surface-variant rounded-t-full h-full relative group-hover:bg-primary-container transition-colors duration-300"></div>
<span class="font-label-sm text-label-sm text-secondary mt-2">T</span>
</div>
<!-- Bar 3 -->
<div class="flex flex-col items-center justify-end w-full h-[85%] group">
<div class="w-full bg-primary-container rounded-t-full h-full relative group-hover:bg-primary transition-colors duration-300 shadow-sm"></div>
<span class="font-label-sm text-label-sm text-primary mt-2 font-bold">W</span>
</div>
<!-- Bar 4 -->
<div class="flex flex-col items-center justify-end w-full h-[50%] group">
<div class="w-full bg-surface-variant rounded-t-full h-full relative group-hover:bg-primary-container transition-colors duration-300"></div>
<span class="font-label-sm text-label-sm text-secondary mt-2">T</span>
</div>
<!-- Bar 5 -->
<div class="flex flex-col items-center justify-end w-full h-[70%] group">
<div class="w-full bg-surface-variant rounded-t-full h-full relative group-hover:bg-primary-container transition-colors duration-300"></div>
<span class="font-label-sm text-label-sm text-secondary mt-2">F</span>
</div>
<!-- Bar 6 -->
<div class="flex flex-col items-center justify-end w-full h-[30%] group">
<div class="w-full bg-secondary-container rounded-t-full h-full relative group-hover:bg-primary-container transition-colors duration-300"></div>
<span class="font-label-sm text-label-sm text-secondary mt-2">S</span>
</div>
<!-- Bar 7 -->
<div class="flex flex-col items-center justify-end w-full h-[45%] group">
<div class="w-full bg-secondary-container rounded-t-full h-full relative group-hover:bg-primary-container transition-colors duration-300"></div>
<span class="font-label-sm text-label-sm text-secondary mt-2">S</span>
</div>
</div>
</section>
<!-- Donut Chart: Hint usage -->
<section class="bg-surface-container-lowest rounded-xl p-padding-internal hygge-shadow tactile-bevel flex flex-col gap-stack-md">
<h2 class="font-headline-sm text-headline-sm text-primary">Hint usage</h2>
<div class="flex items-center justify-center py-4">
<div class="relative w-40 h-40">
<!-- The Donut -->
<div class="w-full h-full rounded-full" style="background: conic-gradient(#c5b5dc 0% 75%, #ebddd7 75% 90%, #f2ecf0 90% 100%);"></div>
<!-- The Inner Cutout -->
<div class="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 w-28 h-28 bg-surface-container-lowest rounded-full flex items-center justify-center tactile-bevel shadow-inner">
<div class="flex flex-col items-center">
<span class="font-number-display text-number-display text-primary text-2xl">1.2</span>
<span class="font-label-sm text-label-sm text-secondary">per game</span>
</div>
</div>
</div>
</div>
<!-- Legend -->
<div class="flex justify-center gap-4 mt-2">
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-primary-container"></div>
<span class="font-label-sm text-label-sm text-secondary">No Hints</span>
</div>
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-secondary-container"></div>
<span class="font-label-sm text-label-sm text-secondary">1-2 Hints</span>
</div>
<div class="flex items-center gap-2">
<div class="w-3 h-3 rounded-full bg-surface-container"></div>
<span class="font-label-sm text-label-sm text-secondary">3+ Hints</span>
</div>
</div>
</section>
</main>
<!-- BottomNavBar (Mobile) -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pt-2 pb-8 bg-surface dark:bg-surface-container-low shadow-[0px_-4px_12px_rgba(58,51,45,0.06)] rounded-t-xl md:hidden">
<!-- Inactive Tab: Play -->
<button class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 hover:bg-secondary-container/50 rounded-xl transition-colors">
<span class="material-symbols-outlined" data-icon="extension">extension</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider mt-1">Play</span>
</button>
<!-- Inactive Tab: Levels -->
<button class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 hover:bg-secondary-container/50 rounded-xl transition-colors">
<span class="material-symbols-outlined" data-icon="grid_view">grid_view</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider mt-1">Levels</span>
</button>
<!-- Active Tab: Stats -->
<button class="flex flex-col items-center justify-center bg-primary-container text-on-primary-container rounded-xl px-4 py-1.5 scale-98 transition-all duration-200">
<span class="material-symbols-outlined icon-fill" data-icon="leaderboard">leaderboard</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider mt-1 font-bold">Stats</span>
</button>
<!-- Inactive Tab: Shop -->
<button class="flex flex-col items-center justify-center text-secondary px-4 py-1.5 hover:bg-secondary-container/50 rounded-xl transition-colors">
<span class="material-symbols-outlined" data-icon="storefront">storefront</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider mt-1">Shop</span>
</button>
</nav>
</body></html>
