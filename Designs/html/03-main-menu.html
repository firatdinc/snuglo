<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Snuglo - Main Menu</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@400;500&amp;family=Plus+Jakarta+Sans:wght@600&amp;family=Space+Grotesk:wght@500&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "primary": "#65587a",
                        "on-secondary": "#ffffff",
                        "on-secondary-fixed": "#211a17",
                        "tertiary": "#665f31",
                        "surface": "#fdf8fb",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#ece7ea",
                        "outline-variant": "#cbc4ce",
                        "on-secondary-container": "#6b605c",
                        "primary-fixed": "#ecdcff",
                        "on-background": "#1c1b1d",
                        "on-primary-fixed": "#211634",
                        "on-tertiary-fixed": "#201c00",
                        "secondary-fixed": "#eedfda",
                        "error-container": "#ffdad6",
                        "on-surface": "#1c1b1d",
                        "surface-tint": "#65587a",
                        "inverse-surface": "#323032",
                        "secondary": "#675c58",
                        "primary-container": "#c5b5dc",
                        "outline": "#7a757e",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#ded9dc",
                        "error": "#ba1a1a",
                        "surface-variant": "#e6e1e4",
                        "on-primary-fixed-variant": "#4d4162",
                        "secondary-fixed-dim": "#d2c4be",
                        "inverse-primary": "#d0c0e7",
                        "on-secondary-fixed-variant": "#4e4541",
                        "on-primary-container": "#524566",
                        "inverse-on-surface": "#f5eff2",
                        "on-surface-variant": "#49454d",
                        "secondary-container": "#ebddd7",
                        "tertiary-fixed": "#eee4aa",
                        "primary-fixed-dim": "#d0c0e7",
                        "surface-container-highest": "#e6e1e4",
                        "on-error": "#ffffff",
                        "surface-bright": "#fdf8fb",
                        "on-tertiary-container": "#524c20",
                        "tertiary-container": "#c6bd86",
                        "tertiary-fixed-dim": "#d1c890",
                        "on-tertiary-fixed-variant": "#4d471c",
                        "surface-container-low": "#f8f2f5",
                        "on-tertiary": "#ffffff",
                        "background": "#fdf8fb",
                        "surface-container": "#f2ecf0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "padding-internal": "16px",
                        "stack-lg": "32px",
                        "gutter-grid": "4px",
                        "margin-screen": "24px",
                        "stack-md": "16px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "number-display": ["Space Grotesk"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "label-sm": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "number-display": ["20px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "body-md": ["15px", {"lineHeight": "21px", "fontWeight": "400"}],
                        "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "headline-sm": ["18px", {"lineHeight": "24px", "fontWeight": "600"}],
                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .material-fill {
            font-variation-settings: 'FILL' 1;
        }
        
        /* Subtle tactile grain overlay for the background */
        body {
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.03'/%3E%3C/svg%3E");
            background-color: #fdf8fb; /* Match background token */
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background min-h-screen relative font-body-md selection:bg-primary-container selection:text-on-primary-container overflow-x-hidden md:hidden">
<!-- TopAppBar from JSON -->
<header class="fixed top-0 w-full z-50 flex justify-between items-center px-6 h-16 bg-surface/80 dark:bg-surface-dim/80 backdrop-blur-md">
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-[24px]">settings</span>
</button>
<h1 class="font-headline-md text-headline-md font-bold tracking-tight text-primary dark:text-primary-fixed">
            Snuglo
        </h1>
<button class="w-10 h-10 flex items-center justify-center rounded-full text-on-surface-variant hover:opacity-80 transition-opacity active:scale-95 transition-transform duration-150">
<span class="material-symbols-outlined text-[24px]">shopping_bag</span>
</button>
</header>
<!-- Main Content Canvas -->
<main class="pt-24 pb-32 px-margin-screen flex flex-col gap-stack-lg max-w-md mx-auto">
<!-- Progress Pill (Requested by User) -->
<div class="flex justify-center w-full">
<div class="inline-flex items-center gap-2 bg-surface-container border-[1.5px] border-surface-container-high px-4 py-1.5 rounded-full shadow-sm">
<span class="material-symbols-outlined text-[18px] text-tertiary material-fill">star</span>
<span class="font-number-display text-number-display text-on-surface">Level 12 <span class="text-on-surface-variant opacity-60 text-sm">/ 240</span></span>
</div>
</div>
<!-- Hero Card: Daily Puzzle -->
<section class="relative bg-surface-container-lowest rounded-[24px] shadow-[0px_4px_12px_rgba(58,51,45,0.06)] overflow-hidden flex flex-col border-[0.5px] border-outline-variant/30 group cursor-pointer active:scale-[0.98] transition-transform duration-200">
<!-- Top Bevel Highlight -->
<div class="absolute top-0 left-0 right-0 h-[1px] bg-white/60 z-10"></div>
<!-- Hero Image/Graphic Area -->
<div class="h-40 w-full relative bg-secondary-container/20 overflow-hidden">
<!-- Abstract puzzle background pattern -->
<div class="absolute inset-0 opacity-40 bg-[radial-gradient(circle_at_top_right,_var(--tw-gradient-stops))] from-primary-container/40 via-transparent to-transparent"></div>
<img alt="Daily Puzzle Art" class="w-full h-full object-cover mix-blend-multiply opacity-80" data-alt="A serene, softly lit flat-lay composition of pastel-colored, smooth wooden abstract shapes resting on a bright, uncluttered matte white surface. The lighting is warm and diffused, creating soft, realistic ambient shadows typical of a modern light-mode 'Hygge' aesthetic. Colors emphasize muted lavenders, soft blush pinks, and warm off-whites, evoking a calm, tactile puzzle experience." src="https://lh3.googleusercontent.com/aida-public/AB6AXuAYWzl6AjcESo97-J1OTUyb8tuA4H9qinwx2PZUISmkRGvfz1rPIL70PNODqWFW5WsHlAyAy7Z8aw6J8A2nWIhuPBU-TBku9hugp6vJncl5IylennZwRC245YNbiVIhsqCtMi6QyxcgOsGU6PRkUn32xT9RyonXPEkv3Om8dn8yBjIdnoGFiqvYzl3RnLCDaU_gJBBIY4EejYVEKZpB6Yepcmy0RSMUZxSqtSVON1MKCKmYDzYrOpqnARO0uBKM72uM36PWbLYTjtoA"/>
<!-- Badge -->
<div class="absolute top-4 left-4 bg-surface-container-lowest/90 backdrop-blur-sm border-[1px] border-surface-container-high px-3 py-1 rounded-lg shadow-sm">
<span class="font-label-sm text-label-sm uppercase tracking-wider text-on-surface-variant">May 24</span>
</div>
</div>
<!-- Card Content -->
<div class="p-5 flex justify-between items-center bg-surface-container-lowest relative z-20">
<div class="flex flex-col gap-1">
<h2 class="font-headline-lg text-headline-lg text-on-surface">Daily Puzzle</h2>
<p class="font-body-md text-body-md text-on-surface-variant flex items-center gap-1">
<span class="material-symbols-outlined text-[16px]">schedule</span> 
                        Refresh in 4h 12m
                    </p>
</div>
<!-- Lavender Play Button (Tactile) -->
<button class="w-14 h-14 bg-primary-container text-on-primary-container rounded-[16px] flex items-center justify-center shadow-sm border-t-[0.5px] border-white/50 hover:bg-primary-container/90 transition-colors group-active:bg-primary-fixed-dim">
<span class="material-symbols-outlined text-[32px] material-fill ml-1">play_arrow</span>
</button>
</div>
</section>
<!-- Continue Playing Section -->
<section class="flex flex-col gap-stack-sm">
<div class="flex justify-between items-end px-2">
<h3 class="font-headline-sm text-headline-sm text-on-surface">Continue</h3>
<span class="font-label-sm text-label-sm text-primary uppercase tracking-wider cursor-pointer hover:opacity-80">View Map</span>
</div>
<div class="bg-surface-container-lowest rounded-[20px] shadow-[0px_4px_12px_rgba(58,51,45,0.06)] p-4 flex gap-4 items-center border-[0.5px] border-outline-variant/30 cursor-pointer active:scale-[0.98] transition-transform duration-200">
<!-- Thumbnail -->
<div class="w-20 h-20 rounded-xl bg-surface-container overflow-hidden flex-shrink-0 relative border-[1px] border-surface-container-high">
<img alt="Level Thumbnail" class="w-full h-full object-cover" data-alt="A top-down view of a partially completed minimalist block puzzle. The square puzzle pieces have smooth, rounded corners and are painted in soft, pale sage and cream colors. They rest within a light birch wood frame on a clean, bright background. Gentle, natural light casts soft shadows, enhancing the clean, calm visual style." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDKWG82VsltcQnTCyu6mm9SiG5UOVmTqYwMEhEu22lbIsI0S-JV_4AGAiyo5DDB_wJtH01pgww7J2fSIwtlK8ltCqbaHg76gP3gy3S0PeyXOQlVJN4ntANVNFDlXxbPD-Uyw1QMnKIUt8ClApo7XIhGCje81tyD-eDD9aVrOM-FsC-vTT44R7pj_H5m96gdy5WaBF9tw30vSg93jDI4bhtmmx0QZYUHjBbWyvcfKOGZtV1MUBXzC9o0keh-BPtc6Tm5z8H0eNkYsJ0A"/>
</div>
<!-- Info -->
<div class="flex flex-col flex-grow gap-2">
<div>
<h4 class="font-headline-md text-headline-md text-on-surface leading-tight">Woodland Retreat</h4>
<p class="font-body-md text-body-md text-on-surface-variant">Level 12</p>
</div>
<!-- Progress Bar (Thick, rounded) -->
<div class="flex items-center gap-3 mt-1">
<div class="h-3 w-full bg-surface-variant rounded-full overflow-hidden">
<div class="h-full bg-primary-container rounded-full w-[65%]"></div>
</div>
<span class="font-number-display text-[14px] font-medium text-on-surface-variant">65%</span>
</div>
</div>
</div>
</section>
</main>
<!-- BottomNavBar from JSON -->
<nav class="fixed bottom-0 left-0 w-full z-50 flex justify-around items-center px-6 pt-2 pb-8 bg-surface dark:bg-surface-container-low rounded-t-xl shadow-[0px_-4px_12px_rgba(58,51,45,0.06)]">
<!-- Active Tab: Play -->
<button class="flex flex-col items-center justify-center bg-primary-container dark:bg-primary text-on-primary-container dark:text-on-primary rounded-xl px-4 py-1.5 active:scale-98 transition-all duration-200">
<span class="material-symbols-outlined text-[24px] material-fill mb-1">extension</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Play</span>
</button>
<!-- Inactive Tab: Levels -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim px-4 py-1.5 hover:bg-secondary-container/50 dark:hover:bg-secondary-container/20 rounded-xl transition-all duration-200">
<span class="material-symbols-outlined text-[24px] mb-1">grid_view</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Levels</span>
</button>
<!-- Inactive Tab: Stats -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim px-4 py-1.5 hover:bg-secondary-container/50 dark:hover:bg-secondary-container/20 rounded-xl transition-all duration-200">
<span class="material-symbols-outlined text-[24px] mb-1">leaderboard</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Stats</span>
</button>
<!-- Inactive Tab: Shop -->
<button class="flex flex-col items-center justify-center text-secondary dark:text-secondary-fixed-dim px-4 py-1.5 hover:bg-secondary-container/50 dark:hover:bg-secondary-container/20 rounded-xl transition-all duration-200">
<span class="material-symbols-outlined text-[24px] mb-1">storefront</span>
<span class="font-label-sm text-label-sm uppercase tracking-wider">Shop</span>
</button>
</nav>
</body></html>
