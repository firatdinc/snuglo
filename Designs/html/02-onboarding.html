<!DOCTYPE html>

<html lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>Snuglo - Onboarding</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>

        tailwind.config = {
            darkMode: "class",

                        "tertiary": "#665f31",
                        "surface": "#fdf8fb",
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "surface-container-high": "#ece7ea",
                        "outline-variant": "#cbc4ce",
                        "on-secondary-container": "#6b605c",
                        "primary-fixed": "#ecdcff",
                        "on-background": "#1c1b1d",
                        "on-primary-fixed": "#211634",
                        "on-tertiary-fixed": "#201c00",
                        "secondary-fixed": "#eedfda",
                        "error-container": "#ffdad6",
                        "on-surface": "#1c1b1d",
                        "surface-tint": "#65587a",
                        "inverse-surface": "#323032",
                        "secondary": "#675c58",
                        "primary-container": "#c5b5dc",
                        "outline": "#7a757e",
                        "surface-container-lowest": "#ffffff",
                        "surface-dim": "#ded9dc",
                        "error": "#ba1a1a",
                        "surface-variant": "#e6e1e4",
                        "on-primary-fixed-variant": "#4d4162",
                        "secondary-fixed-dim": "#d2c4be",
                        "inverse-primary": "#d0c0e7",
                        "on-secondary-fixed-variant": "#4e4541",
                        "on-primary-container": "#524566",
                        "inverse-on-surface": "#f5eff2",
                        "on-surface-variant": "#49454d",
                        "secondary-container": "#ebddd7",
                        "tertiary-fixed": "#eee4aa",
                        "primary-fixed-dim": "#d0c0e7",
                        "surface-container-highest": "#e6e1e4",
                        "on-error": "#ffffff",
                        "surface-bright": "#fdf8fb",
                        "on-tertiary-container": "#524c20",
                        "tertiary-container": "#c6bd86",
                        "tertiary-fixed-dim": "#d1c890",
                        "on-tertiary-fixed-variant": "#4d471c",
                        "surface-container-low": "#f8f2f5",
                        "on-tertiary": "#ffffff",
                        "background": "#fdf8fb",
                        "surface-container": "#f2ecf0"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "padding-internal": "16px",
                        "stack-lg": "32px",
                        "gutter-grid": "4px",
                        "margin-screen": "24px",
                        "stack-md": "16px",
                        "stack-sm": "8px"
                    },
                    "fontFamily": {
                        "body-lg": ["Be Vietnam Pro"],
                        "headline-lg": ["Plus Jakarta Sans"],
                        "number-display": ["Space Grotesk"],
                        "body-md": ["Be Vietnam Pro"],
                        "headline-md": ["Plus Jakarta Sans"],
                        "headline-sm": ["Plus Jakarta Sans"],
                        "label-sm": ["Be Vietnam Pro"]
                    },
                    "fontSize": {
                        "body-lg": ["17px", {"lineHeight": "24px", "fontWeight": "400"}],
                        "headline-lg": ["28px", {"lineHeight": "34px", "letterSpacing": "-0.02em", "fontWeight": "600"}],
                        "number-display": ["20px", {"lineHeight": "24px", "fontWeight": "500"}],
                        "body-md": ["15px", {"lineHeight": "21px", "fontWeight": "400"}],
                        "headline-md": ["22px", {"lineHeight": "28px", "fontWeight": "600"}],

                        "label-sm": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "500"}]
                    }
                }
            }
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        /* Soft tactile styling for active elements */
        .tactile-edge {
            box-shadow: inset 0 1px 0 0 rgba(255,255,255,0.5), 0px 4px 12px rgba(58, 51, 45, 0.06);
        }

        /* Ambient background blobs for Hygge feel */
        .bg-blob-1 {
            background: radial-gradient(circle, rgba(236,220,255,0.4) 0%, rgba(253,248,251,0) 70%);
        }
        .bg-blob-2 {
            background: radial-gradient(circle, rgba(238,223,218,0.4) 0%, rgba(253,248,251,0) 70%);
        }
        
        /* Swipe animation indicator */
        @keyframes subtle-swipe {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(-10px); }
        }
        .animate-swipe-hint {
            animation: subtle-swipe 3s ease-in-out infinite;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background text-on-background font-body-md antialiased min-h-screen relative overflow-hidden flex flex-col items-center justify-between selection:bg-primary-container selection:text-on-primary-container">
<!-- Atmospheric Background Layers -->
<div class="absolute top-[-15%] left-[-20%] w-[70vw] h-[70vw] bg-blob-1 rounded-full pointer-events-none z-0"></div>
<div class="absolute bottom-[-10%] right-[-10%] w-[60vw] h-[60vw] bg-blob-2 rounded-full pointer-events-none z-0"></div>
<!-- Top Action Area -->
<header class="w-full max-w-md px-margin-screen pt-8 flex justify-end items-center z-10 relative">
<button class="font-label-sm text-label-sm text-on-surface-variant hover:text-primary transition-colors py-2 px-4 rounded-full hover:bg-surface-variant/50">
            Skip
        </button>
</header>
<!-- Main Onboarding Content -->
<main class="flex-1 flex flex-col items-center justify-center w-full max-w-md px-margin-screen gap-stack-lg z-10 relative animate-swipe-hint" id="swipe-container">
<!-- Center Illustration (Tactile Modernism) -->
<div class="relative w-64 h-64 md:w-72 md:h-72 bg-surface rounded-[32px] tactile-edge flex items-center justify-center overflow-hidden border border-outline-variant/20">
<!-- Image Generation Prompt embedded in data-alt -->
<div class="absolute inset-0 bg-cover bg-center" data-alt="A soft, 3D rendered illustration of a minimalist grid puzzle resting on a clean cream surface. The puzzle pieces are physical, tactile blocks painted in gentle pastel colors like lavender, warm off-white, and muted sage green. The lighting is incredibly soft and high-key, creating gentle ambient shadows that emphasize the rounded, organic edges of the wooden-like blocks. The overall aesthetic perfectly captures a serene, uncluttered 'Hygge' mood with a sophisticated, light-mode palette." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCuVrG1JRnXJybYX6XHSNrjXe2iAPgvVMZFQIMPmGZQs18HYCfT0bqxAtat0hkqvcFXVCRtEApOlboXOsVQ5xkjrjBe6jFECl7Yg5AHw8-SaRwS9CJYyGiwVY0yyMdtHj1KzwdUKZfXcMAaUUZZjV6enuet1QFyhcirn5u7ij_6lXNNymTwgNG7Qsva5umDB3aNmNAqeota7OHilHhsi-zikckK_E9phIKYnY4t3IqovDp7eXMTB2iOIHK2tCKzgIruk3Upi4cwrOMv');">
</div>
<!-- Subtle gradient overlay to ensure it blends softly with the container -->
<div class="absolute inset-0 bg-gradient-to-tr from-surface/20 to-transparent pointer-events-none"></div>
</div>
<!-- Typography -->
<div class="text-center flex flex-col gap-stack-sm items-center mt-4">
<h1 class="font-headline-lg text-headline-lg text-on-background">Welcome to Snuglo</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">
                A cozy puzzle to fit your day
            </p>
</div>
</main>
<!-- Bottom Pagination Indicator -->
<footer class="w-full max-w-md pb-12 pt-8 flex justify-center items-center gap-3 z-10 relative">
<!-- Active Dot -->
<div class="w-8 h-2.5 rounded-full bg-primary shadow-sm transition-all duration-300"></div>
<!-- Inactive Dots -->
<div class="w-2.5 h-2.5 rounded-full bg-surface-variant transition-all duration-300"></div>
<div class="w-2.5 h-2.5 rounded-full bg-surface-variant transition-all duration-300"></div>
</footer>
<!-- Simple JS to stop swipe hint on interaction -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const container = document.getElementById('swipe-container');
            
            // Stop animation once user interacts to indicate they 'get' it
            const stopAnimation = () => {
                container.classList.remove('animate-swipe-hint');
                container.style.transform = 'none';
            };

            container.addEventListener('touchstart', stopAnimation, { once: true });
            container.addEventListener('mousedown', stopAnimation, { once: true });
        });
    </script>
</body></html>
