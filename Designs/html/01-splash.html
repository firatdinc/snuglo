<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        
        .block-shadow {
            box-shadow: 0px 4px 12px rgba(58, 51, 45, 0.06);
            border-top: 1px solid rgba(255,255,255,0.5);
        }

        .fade-in-up {
            opacity: 0;
            transform: translateY(10px);
            transition: opacity 0.8s ease-out, transform 0.8s ease-out;
        }

        .fade-in-up.visible {
            opacity: 1;
            transform: translateY(0);
        }
        
        .pulse-soft {
            animation: pulse-soft 3s infinite ease-in-out alternate;
        }
        
        @keyframes pulse-soft {
            0% { transform: scale(1); }
            100% { transform: scale(1.02); }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background min-h-screen flex items-center justify-center overflow-hidden w-full m-0 p-0">
<div class="fade-in-up flex flex-col items-center justify-center p-margin-screen" id="splash-content">
<div class="grid grid-cols-3 gap-gutter-grid w-[72px] h-[72px] mb-stack-lg pulse-soft bg-surface-container-low p-2 rounded-xl block-shadow">
<div class="bg-primary-container rounded block-shadow w-full h-full"></div>
<div class="bg-surface-container-high rounded w-full h-full"></div>
<div class="bg-secondary-container rounded block-shadow w-full h-full"></div>
<div class="bg-surface-container-high rounded w-full h-full"></div>
<div class="bg-tertiary-container rounded block-shadow w-full h-full"></div>
<div class="bg-surface-container-high rounded w-full h-full"></div>
<div class="bg-error-container rounded block-shadow w-full h-full"></div>
<div class="bg-surface-container-high rounded w-full h-full"></div>
<div class="bg-surface-container-high rounded w-full h-full"></div>
</div>
<h1 class="font-headline-lg text-headline-lg text-on-surface tracking-tight">Snuglo</h1>
</div>
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const content = document.getElementById('splash-content');
            
            setTimeout(() => {
                content.classList.add('visible');
            }, 100);
            
            const blocks = document.querySelectorAll('.block-shadow');
            blocks.forEach((block, index) => {
                block.style.transition = 'transform 0.3s ease';
                setTimeout(() => {
                    block.style.transform = 'scale(1.05)';
                    setTimeout(() => {
                        block.style.transform = 'scale(1)';
                    }, 300);
                }, 400 + (index * 150));
            });
        });
    </script>
</body></html>
